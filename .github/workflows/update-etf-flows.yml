name: Update BTC ETF Flows

on:
  schedule:
    # Daily at 11 PM UTC = next day 4:30 AM IST
    # Farside updates after US market close (~8 PM EST = 1 AM UTC next day)
    - cron: '0 23 * * *'
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || git commit -m "ETF data update $(date -u +'%Y-%m-%d')"
          git push